name: 'Ascent'
description: >-
  Goal-based app QA. Runs persona-driven live-user evaluators against your app,
  scores the KPIs in your goal config, and posts a milestone-readiness check-run
  with a sticky PR comment (scorecard + ranked, goal-linked recommendations).
  The consuming workflow needs `checks: write` and `pull-requests: write`, and
  should pass `ANTHROPIC_API_KEY` (and `GITHUB_TOKEN`) via the step `env`.
author: 'James McDaniel'
branding:
  icon: 'trending-up'
  color: 'green'

inputs:
  target:
    description: 'Target spec (web://… | api://… | ios://… | android://…). Overrides the config target.'
    required: false
    default: ''
  config:
    description: 'Path to the goal config, relative to the workspace.'
    required: false
    default: 'ascent.yaml'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.target }}
    - '--config'
    - ${{ inputs.config }}
